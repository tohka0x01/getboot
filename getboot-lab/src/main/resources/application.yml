server:
  port: 18080

spring:
  application:
    name: getboot-lab

getboot:
  observability:
    trace:
      enabled: true
      header-name: X-Trace-Id
      response-header-enabled: true
      request-header-propagation-enabled: true
      id-generator: short
      short-length: 12

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
